<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title -->
    <title>Next Online Tools | Free Online Tools for Daily Tasks</title>

    <!-- SEO Meta -->
    <meta
      name="description"
      content="Next Online Tools offers free, fast, and user-friendly online tools for image, text, color, SEO, and daily digital tasks."
    />
    <meta
      name="keywords"
      content="online tools, free tools, image tools, text tools, converter tools, web tools"
    />
    <meta name="author" content="Next Online Tools" />

    <!-- Open Graph (Facebook / LinkedIn) -->
    <meta property="og:title" content="Next Online Tools" />
    <meta
      property="og:description"
      content="Free and easy online tools for everyday digital tasks."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://nextonlinetools.com" />
    <meta property="og:image" content="/favicon.ico" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Next Online Tools" />
    <meta
      name="twitter:description"
      content="Fast, simple and free tools for daily digital work."
    />
    <meta name="twitter:image" content="/favicon.ico" />

    <!-- PWA -->
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#9B6CE3" />

    <!-- Canonical -->
    <link rel="canonical" href="https://nextonlinetools.com/" />
  </head>

  <body>
    <div id="root"></div>

    <!-- React App -->
